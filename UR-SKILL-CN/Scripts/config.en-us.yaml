---
lang: en-us
meta:
  title: UR-SKILL Validation Rules
  version: "2.0"

thresholds:
  max_body_lines: 500
  max_description_chars: 200
  min_description_chars: 50

frontmatter:
  required_fields:
    name: str
    description: str
    type: str
    whenToUse: str
    metadata: dict
  valid_types:
    - prompt
    - tool
    - hybrid
  metadata:
    updated_required: true
    updated_format: "%Y-%m-%d"

workflow:
  step_heading_pattern: '^#{2,4}\s*\d+\.\s*(\S+?)\s*\(.*?\).*?(?:dimension|dimensions).*$'
  step_names:
    - Parse
    - Pre-Analysis
    - Research
    - Architecture
    - Execute
    - Deliver
    - Verify
    - Validate
  expected_checks:
    Parse: 3
    Pre-Analysis: 4
    Research: 7
    Architecture: 7
    Execute: 4
    Deliver: 4
    Verify: 7
    Validate: 8
  critical_steps:
    - Research
    - Architecture
    - Verify
    - Validate
  required_dimensions:
    - Goal Alignment
    - Fact Anchoring
  critical_only_dimensions:
    - Direction Calibration
    - Adversarial Validation
    - Blind Spot Identification
    - Impact Projection

rules:
  rules_heading_pattern: '^#{2,3}\s*(?:\d+\.?\s*)?[Rr]ules.*$'
  rfc2119_keywords:
    - MUST
    - MUST NOT
    - SHOULD
    - SHOULD NOT
    - MAY

  risk_boundaries:
    - illegal
    - discrimination
    - malicious injection

  risk_boundary_abuse_keywords:
    - not responsible
    - does not belong
    - outside the scope
    - not in charge of
    - does not assume
    - only does.*not do
    - limited to
    - does not involve
    - does not include

  professional_boundary_abuse_keywords:
    - not responsible
    - only does.*not do
    - not in charge of
    - does not assume

  facet_filler_patterns:
    - master relevant domain knowledge
    - familiar with (?:relevant )?domain (?:knowledge|standards)
    - identify potential risks
    - ensure output quality
    - consider global impact
    - optimize resource investment
    - analyze task complexity
    - ensure.*quality

  blind_dump_keywords:
    - for reference only
    - please verify yourself
    - there may be.*blind spots
    - does not guarantee.*(?:completeness|accuracy)
    - please.*(?:check|verify|confirm) before use

placeholders:
  general_patterns:
    - '\[(?!cognitive operation\])(?![^\]]*\]\()[^\]]*\]'
    - '\{.*?\}'
    - 'TODO|FIXME|XXX|HACK'
  unresolved_patterns:
    - pattern: '\{kebab-case-name\}'
      label: name placeholder
    - pattern: '\{SKILL name\}'
      label: title placeholder
    - pattern: '\{YYYY-MM-DD\}'
      label: date placeholder
    - pattern: '\{core domain name\}'
      label: core domain name placeholder
    - pattern: '\{domain\d\}'
      label: radiating domain name placeholder
    - pattern: '\{This SKILL (?:must not cross|does not cross).*(?:safety red line|professional domain boundary)\}'
      label: boundary declaration placeholder
    - pattern: '\{natural language/structured/hybrid[,，]\s*brief description\}'
      label: output format description placeholder
    - pattern: '\{format type\}'
      label: output format type placeholder
    - pattern: '\{Mermaid \{type\}\}'
      label: Mermaid type placeholder
    - pattern: '\{N\}'
      label: loop round count placeholder
    - pattern: '\{fill color\}'
      label: Mermaid fill color placeholder
    - pattern: '\{text color\}'
      label: Mermaid text color placeholder
    - pattern: '\{scenario\}'
      label: example scenario placeholder
    - pattern: '\{user input content\}'
      label: example input placeholder
    - pattern: '\{expected output content[^}]*\}'
      label: example output placeholder
    - pattern: '\{N months\}'
      label: review period placeholder
    - pattern: '\{MAJOR\.MINOR\.PATCH\}'
      label: semantic version placeholder
  allowed_patterns:
    - '^\[.*\]\(.*\)$'
    - '^\[".*"\]$'
    - '^\["\[.*\].*"\]$'
    - '^\[(Critical|Non-Critical) (node|Checkpoint)'
    - '^\[(Read|Write|AskUserQuestion|NotifyUser|RunCommand|Grep|Glob|Task|Skill|DeleteFile|Edit|TodoWrite)\b'
  allowed_literals:
    - "[ ]"
    - "[x]"
    - "[X]"
    - "[toolname]"
    - "[ToolName]"
    - "[filename]"
    - "[dirname]"
    - "[parameter]"
    - "[operation]"
    - "{date}"

tools:
  known:
    - Read
    - Write
    - Edit
    - DeleteFile
    - RunCommand
    - CheckCommandStatus
    - StopCommand
    - Grep
    - Glob
    - LS
    - SearchCodebase
    - WebSearch
    - WebFetch
    - AskUserQuestion
    - NotifyUser
    - Task
    - Skill
    - run_mcp
    - TodoWrite
    - OpenPreview
    - GetDiagnostics
  binding_exempt_skills:
    - ur-skill
    - pre-analysis-engineer
  exempt_action_prefixes:
    - read
    - confirm
    - check
    - assemble
    - summarize
    - simulate
    - populate
  action_verbs:
    - read
    - call
    - execute
    - run
    - search
    - create
    - write
    - edit
    - delete
    - open

output_spec:
  keywords:
    - review
    - test
    - audit
    - scan
    - code-review
    - security-review
    - quality
  checks:
    mermaid:
      label: Mermaid visualization requirement
      patterns:
        - mermaid
        - flowchart
        - sequenceDiagram
        - classDiagram
        - stateDiagram
    severity:
      label: Issue severity classification
      patterns:
        - (Critical|High|Medium|Low).*severity
        - (Critical|High|Medium|Low).*level
    interaction:
      label: User interaction mode
      patterns:
        - AskUserQuestion
        - confirm.*fix.*verify.*loop
        - phased delivery
        - user interaction mode
    decision:
      label: Decision strategy
      patterns:
        - decision strategy
        - block.*merge
        - suggest.*merge
        - Pass\|Revision Required\|Block

identity:
  inflated_titles:
    - expert
    - professor
    - master
    - guru
    - veteran
    - senior
    - top-tier
    - leading
  experience_patterns:
    - '\d+\s*years.*experience'
    - '\d+\+?\s*years.*experience'
  identity_keywords:
    - '**Identity**:'
    - '**Role**:'
    - 'Identity:'
    - 'Role:'

self_contained:
  forbidden_prefixes:
    - design-guides/
    - templates/
    - design-rationale/
    - Scripts/
  special_files:
    - References/pre-analysis.md
    - agent/SKILL.md
  exempt_skills:
    - ur-skill
    - pre-analysis-engineer

file_dependency:
  workflow_heading: '^#{2,3}\s*(?:\d+\.?\s*)?(?:Workflow|[Ww]orkflow)'
  indicators:
    - file dependency decision
    - pre-analysis.md section 2
    - pre-analysis.md#2
    - design-rationale.md section 9
    - design-rationale.md#9

reference_dirs:
  - References
  - Scripts
  - assets
  - design-guides
  - templates

deprecated_tools:
  SearchReplace: Edit

messages:
  missing_frontmatter_delimiter: "SKILL.md must start with `---`"
  missing_frontmatter_end: "Cannot parse frontmatter: missing second `---` delimiter"
  pyyaml_missing: "PyYAML not installed, skipping frontmatter field type validation (run `pip install pyyaml`)"
  frontmatter_yaml_error: "frontmatter YAML parse failed: {error}"
  frontmatter_missing_field: "frontmatter missing required field: {field}"
  frontmatter_wrong_type: "frontmatter field {field} wrong type, expected {expected}"
  frontmatter_dict_required: "frontmatter field {field} must be a dict"
  name_not_kebab: "name '{name}' is not valid kebab-case"
  description_length: "description length {length} not within {min}-{max} range"
  type_invalid: "type '{type}' is not a valid value {valid_types}"
  metadata_updated_missing: "metadata.updated missing"
  metadata_updated_format: "metadata.updated '{updated}' is not YYYY-MM-DD format"
  body_too_long: "body line count {lines} exceeds threshold {max_lines}"
  placeholder_residue: "Suspected placeholder residue ({pattern}): {matches}"
  missing_risk_boundary: "Missing risk boundary declaration: {boundary}"
  risk_boundary_abuse: "Risk boundary abuse: suspected disclaimer language '{keyword}' -> '{content}'"
  professional_boundary_abuse: "Professional boundary abuse: suspected capability degradation '{keyword}' -> '{content}'"
  facet_filler: "Facet filler: Facet {facet} too brief, suspected boilerplate '{content}'"
  blind_spot_dumping: "Blind spot dumping: purely declarative blind spot (no 'attempted actions')"
  first_person: "First person: line {line} contains 'I', should use 'you' or no subject -> '{content}'"
  first_person_description: "First person: frontmatter description contains 'I', should use no subject -> '{content}'"
  inflated_title_body: "Inflated title: body line {line} contains '{title}', should use specific profession name (engineer / analyst / reviewer), not hollow title"
  inflated_title_description: "Inflated title: frontmatter description contains '{title}', should use specific profession name"
  fabricated_years_body: "Fabricated years: body line {line} contains '{years}', LLMs have no concept of 'years of experience', should use domain / methodology description instead"
  fabricated_years_description: "Fabricated years: frontmatter description contains '{years}', LLMs have no concept of 'years of experience', should use domain / methodology description instead"
  deprecated_tool: "Tool name migration: found '{old}', should use '{new}' instead"
  workflow_step_count: "Step '{step}' check item count {actual}, expected {expected}"
  workflow_missing_dimension: "Node '{step}' missing required dimension: {dimension}"
  workflow_critical_missing_dimension: "Critical node '{step}' missing dimension: {dimension}"
  workflow_not_found: "Workflow block not found"
  rules_block_not_found: "Rules block not found (heading should contain 'Rules')"
  rules_no_entries: "No rule entries found in rules block (bullet list)"
  rule_no_rfc2119: "Rule{index} does not use RFC 2119 keyword: '{content}'"
  reference_missing: "Referenced reference file does not exist: {path}"
  script_missing: "Referenced script file does not exist: {path}"
  asset_missing: "Referenced asset file does not exist: {path}"
  design_guide_missing: "Referenced design-guide file does not exist: {path}"
  template_missing: "Referenced template file does not exist: {path}"
  file_dependency_missing: "File dependency decision missing: no 'file dependency decision' instruction found in workflow (should add 'file dependency decision' or reference pre-analysis.md section 2 or design-rationale.md section 9)"
  tool_binding_missing: "Tool binding missing: the following actions are not bound to tools (format [ToolName] operation -> output), but other actions in the same SKILL are bound to tools:\n{lines}"
  output_spec_missing: "Review / testing type SKILL missing {label}: did not detect patterns related to {patterns}"
  ur_skill_leak: "UR-SKILL file reference leak: generated SKILL references '{path}', violating self-containment rule (MUST NOT reference UR-SKILL internal files)"
  unresolved_placeholder: "Placeholder unfilled: found {count} occurrence(s) of '{label}'"
  validation_failed: "Validation failed: {count} issue(s) found"
  validation_passed: "Validation passed"
  skill_file_not_found: "Error: {path} not found"
  summary_line: "  - {item}"
