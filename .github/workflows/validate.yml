name: Validate SKILLs

on:
  push:
    paths:
      - 'UR-SKILL-CN/**'
      - 'UR-SKILL-EN/**'
      - 'Examples/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'UR-SKILL-CN/**'
      - 'UR-SKILL-EN/**'
      - 'Examples/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  validate:
    name: Static validate SKILL packages
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5.4.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml==6.0.2 pytest==8.3.5

      - name: Validate UR-SKILL-CN (zh-cn)
        run: |
          python UR-SKILL-CN/Scripts/validate_skill.py --skill-dir UR-SKILL-CN --lang zh-cn

      - name: Validate UR-SKILL-EN (en-us)
        run: |
          python UR-SKILL-EN/Scripts/validate_skill.py --skill-dir UR-SKILL-EN --lang en-us

      - name: Validate Examples
        run: |
          for d in Examples/*/; do
            if [ -f "${d}SKILL.md" ]; then
              example_name=$(basename "$d")
              echo "Validating ${d}"
              python UR-SKILL-CN/Scripts/validate_skill.py --skill-dir "${d}" --lang zh-cn || echo "::warning::Example '${example_name}' validation has issues, see above for details"
            fi
          done

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v

  bilingual-sync:
    name: Check CN/EN structure alignment
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5.4.0
        with:
          python-version: '3.12'

      - name: Run bilingual sync check
        run: |
          python UR-SKILL-CN/Scripts/bilingual_sync.py
