---
lang: en-us
meta:
  title: UR-SKILL Validation Rules
  version: "2.0"

thresholds:
  max_body_lines: 500
  max_description_chars: 200
  min_description_chars: 50

frontmatter:
  required_fields:
    name: str
    description: str
    metadata: dict
  metadata:
    updated_required: true
    updated_format: "%Y-%m-%d"

# Workflow step configuration
workflow:
  step_heading_pattern: '^#{3,5}\s*(?:Master Node|Step)\s*\d*[：:]\s*(\S+?)\s*[（(].*?[）)].*?维.*$'
  step_names:
    - Parse
    - Coordinate
    - Dispatch
    - Research
    - Planning
    - Consolidate
    - Execute
    - Validation
    - Verification
    - Loop
    - Assemble
  expected_checks:
    Parse: 4
    Coordinate: 4
    Dispatch: 4
    Research: 7
    Planning: 7
    Consolidate: 4
    Execute: 4
    Validation: 7
    Verification: 7
    Loop: 0
    Assemble: 4
  critical_steps:
    - Research
    - Planning
    - Validation
    - Verification
    - Loop
  required_dimensions:
    - Goal Alignment
    - Fact Anchoring
  critical_only_dimensions:
    - Direction Calibration
    - Adversarial Validation
    - Blind Spot Identification
    - Impact Projection

rules:
  rules_heading_pattern: '^#{2,3}\s*(?:\d+\.?\s*)?(?:(?:核心)?规则|[Rr]ules|(?:Hard\s+)?Constraints|Hard\s+Prohibitions|Strong\s+Preferences|Optional).*$'
  rfc2119_keywords:
    - MUST
    - MUST NOT
    - SHOULD
    - SHOULD NOT
    - MAY

  # Risk boundary statement keywords (only for UR-SKILL self-check)
  risk_boundaries:
    - illegal
    - discrimination
    - malicious injection

  # Risk boundary abuse detection keywords
  risk_boundary_abuse_keywords:
    - not responsible
    - not part of
    - out of scope
    - does not cover
    - disclaim
    - not liable
    - outside.*scope
    - only.*does not
    - strictly limited to
    - not involved
    - does not include

  # Professional boundary abuse detection keywords
  professional_boundary_abuse_keywords:
    - not responsible
    - only.*does not
    - disclaim
    - not liable

  # Facet filler detection patterns
  facet_filler_patterns:
    - master relevant domain knowledge
    - familiar with (?:relevant )?(?:domain |field )(?:knowledge|standards)
    - identify potential risks
    - ensure output quality
    - consider global impact
    - optimize resource investment
    - analyze task complexity
    - ensure.*quality

  # Blind spot dumping detection keywords
  blind_dump_keywords:
    - for reference only
    - please verify
    - may contain.*(?:gaps|blind spots)
    - does not guarantee.*(?:completeness|accuracy)
    - please (?:check|verify|confirm).*before use

# Placeholder detection
placeholders:
  general_patterns:
    - '\[(?!认知操作\]|Cognitive\s+(?:Op|Operation)\])(?![^\]]*\]\()[^\]]*\]'
    - '\{.*?\}'
    - 'TODO|FIXME|XXX\s*:|HACK'
  # Must-fill placeholders from skill-template.md
  unresolved_patterns:
    - pattern: '\{kebab-case-name\}'
      label: name placeholder
    - pattern: '\{SKILL名称\}'
      label: title placeholder
    - pattern: '\{SKILL Name\}'
      label: skill name placeholder
    - pattern: '\{YYYY-MM-DD\}'
      label: date placeholder
    - pattern: '\{核心领域名\}'
      label: core domain name placeholder
    - pattern: '\{Core Domain Name\}'
      label: core domain name placeholder
    - pattern: '\{领域\d\}'
      label: radiating domain name placeholder
    - pattern: '\{Domain \d\}'
      label: radiating domain name placeholder
    - pattern: '\{该 SKILL (?:不可逾越的安全红线|不得越界的专业领域限制)\}'
      label: boundary declaration placeholder
    - pattern: '\{This SKILL(?:'')?(?:s)? (?:inviolable safety red lines|professional boundary restrictions)\}'
      label: boundary declaration placeholder
    - pattern: '\{自然语言/结构化/混合[,，]\s*简短描述\}'
      label: output format description placeholder
    - pattern: '\{natural language/semi-structured/structured, short description\}'
      label: output format description placeholder
    - pattern: '\{格式类型\}'
      label: output format type placeholder
    - pattern: '\{format type\}'
      label: output format type placeholder
    - pattern: '\{Mermaid \{类型\}\}'
      label: Mermaid type placeholder
    - pattern: '\{Mermaid \{type\}\}'
      label: Mermaid type placeholder
    - pattern: '\{N\}'
      label: loop count placeholder
    - pattern: '\{填充色\}'
      label: Mermaid fill color placeholder
    - pattern: '\{fill color\}'
      label: Mermaid fill color placeholder
    - pattern: '\{文字色\}'
      label: Mermaid text color placeholder
    - pattern: '\{text color\}'
      label: Mermaid text color placeholder
    - pattern: '\{场景\}'
      label: example scenario placeholder
    - pattern: '\{scenario\}'
      label: example scenario placeholder
    - pattern: '\{用户输入内容\}'
      label: example input placeholder
    - pattern: '\{user input content\}'
      label: example input placeholder
    - pattern: '\{期望输出内容[^}]*\}'
      label: example output placeholder
    - pattern: '\{expected output[^}]*\}'
      label: example output placeholder
    - pattern: '\{N 个月\}'
      label: review period placeholder
    - pattern: '\{N months\}'
      label: review period placeholder
    - pattern: '\{MAJOR\.MINOR\.PATCH\}'
      label: semver placeholder
  # Placeholder false positive exclusion
  allowed_patterns:
    - '^\[.*\]\(.*\)$'            # Markdown links
    - '^\[".*"\]$'                  # Mermaid node text
    - '^\["\[.*\].*"\]$'          # Mermaid nested nodes
    - '^\[(Critical|Non-Critical) (node|Checkpoint)'
    - '^\[(Read|Write|AskUserQuestion|NotifyUser|RunCommand|Grep|Glob|Task|Skill|DeleteFile|Edit|TodoWrite)\b'
  allowed_literals:
    - "[ ]"
    - "[x]"
    - "[X]"
    - "[Tool Name]"
    - "[FileName]"
    - "[DirName]"
    - "[Param]"
    - "[Action]"
    - "{date}"
    # Known tool names (Chinese)
    - "[联网搜索]"
    - "[联网抓取]"
    - "[文件读取]"
    - "[文件写入]"
    - "[文本搜索]"
    # Internal notation markers
    - "[Low]"
    - "[Medium]"
    - "[High]"
    - "[Inferred: confidence low]"
    - "[Translator's note: ...]"
    - "[来源, 置信度]"

# Tool bindings
tools:
  known:
    - Read
    - Write
    - Edit
    - DeleteFile
    - RunCommand
    - CheckCommandStatus
    - StopCommand
    - Grep
    - Glob
    - LS
    - SearchCodebase
    - WebSearch
    - WebFetch
    - AskUserQuestion
    - NotifyUser
    - Task
    - Skill
    - run_mcp
    - TodoWrite
    - OpenPreview
    - GetDiagnostics
  # Skills exempt from tool binding check
  binding_exempt_skills:
    - ur-skill
    - ur-skill-cn
    - ur-skill-en
    - research-analyst
  # Verb prefixes that look like actions but are exempt
  exempt_action_prefixes:
    - read
    - confirm
    - check
    - verify
    - assemble
    - consolidate
    - simulate
    - fill
    - identify
    - recognize
    - extract
    - determine
    - output
    - prepare
  action_verbs:
    - read
    - invoke
    - call
    - execute
    - run
    - search
    - create
    - write
    - edit
    - delete
    - open
    - generate
    - dispatch
    - bind

# Review/test SKILL output specifications
output_spec:
  keywords:
    - review
    - test
    - audit
    - scan
    - code-review
    - security-review
    - quality
  checks:
    mermaid:
      label: Mermaid visualization requirement
      patterns:
        - mermaid
        - flowchart
        - sequenceDiagram
        - classDiagram
        - stateDiagram
    severity:
      label: Issue severity levels
      patterns:
        - (Critical|High|Medium|Low)
    interaction:
      label: User interaction mode
      patterns:
        - AskUserQuestion
        - confirm.*fix.*verify.*loop
        - phased delivery
        - user interaction mode
    decision:
      label: Decision strategy
      patterns:
        - Decision Strategy|Reject|Approved|Block.*merge|Recommen..merge

# Identity declaration
identity:
  inflated_titles:
    - Guru
    - Professor
    - Master
    - Grandmaster
    - Senior
    - Top-tier
    - Leading
    - Elite
    - Expert
  experience_patterns:
    - '\d+\s*years.*experience'
    - '\d+\+?\s*years.*experience'
  identity_keywords:
    - '**Identity**:'
    - '**Role**:'
    - 'Role:'
    - 'Identity:'
    - 'You are'

# UR-SKILL file leak detection
self_contained:
  forbidden_prefixes:
    - design-guides/
    - templates/
    - design-rationale/
    - Scripts/
  special_files:
    - agent/SKILL.md
  exempt_skills:
    - ur-skill
    - ur-skill-cn
    - ur-skill-en
    - research-analyst

# File dependency check
file_dependency:
  workflow_heading: '^#{2,3}\s*(?:\d+\.?\s*)?(?:工作流|Workflow)'
  indicators:
    - file dependency decision
    - file dependency declaration
    - design-rationale.md §9
    - design-rationale.md#9

# Capability-workflow confusion detection
capability_workflow_boundary:
  # Terms that should NOT appear in the workflow section
  workflow_forbidden_terms:
    - Capability Matrix
    - Capability Architecture
    - Core Domain
    - Radiating Domain
    - Capability Facet
    - domain fusion
    - 能力矩阵
    - 核心领域
    - 辐射领域
    - 能力切面
    - 领域融合
  # Terms that should NOT appear in the capability section
  capability_forbidden_terms:
    - step\s*\d+
    - Step\s*\d+
    - checklist
    - Workflow
    - Master Node
    - Sub.?Node
    - 步骤\d+
    - 工作流
    - 检查项

# Semantic alignment check
semantic_alignment:
  # Domain keywords extracted from capability matrix must appear in workflow actions
  min_matched_domains: 1

# Tool reference table detection
tool_reference_table:
  patterns:
    - Tool.*(?:Reference|Table|Map)
    - 工具.*表
    - 工具.*引用

# Reference directories
reference_dirs:
  - References
  - Scripts
  - assets
  - design-guides
  - templates

# Deprecated tool names
deprecated_tools:
  SearchReplace: Edit

messages:
  missing_frontmatter_delimiter: "SKILL.md must start with `---`"
  missing_frontmatter_end: "Cannot parse frontmatter: missing closing `---` delimiter"
  pyyaml_missing: "PyYAML is not installed, skipping frontmatter field validation (run `pip install pyyaml`)"
  frontmatter_yaml_error: "Frontmatter YAML parsing failed: {error}"
  frontmatter_missing_field: "Frontmatter missing required field: {field}"
  frontmatter_wrong_type: "Frontmatter field {field} has wrong type, expected {expected}"
  frontmatter_dict_required: "Frontmatter field {field} must be a dictionary"
  name_not_kebab: "name '{name}' is not valid kebab-case"
  description_length: "Description length {length} is out of range ({min}-{max})"
  metadata_updated_missing: "metadata.updated is missing"
  metadata_updated_format: "metadata.updated '{updated}' is not in YYYY-MM-DD format"
  body_too_long: "Body has {lines} lines, exceeding threshold {max_lines}"
  placeholder_residue: "Suspicious placeholder residue ({pattern}): {matches}"
  missing_risk_boundary: "Missing risk boundary statement: {boundary}"
  risk_boundary_abuse: "Risk boundary abuse: suspected disclaimer keyword '{keyword}' -> '{content}'"
  professional_boundary_abuse: "Professional boundary abuse: suspected capability degradation '{keyword}' -> '{content}'"
  facet_filler: "Facet filler: facet {facet} is too brief, suspected formulaic phrasing '{content}'"
  blind_spot_dumping: "Blind spot dumping: pure declarative blind spots (no 'attempted' actions found)"
  first_person: "First person: line {line} uses 'I', should use 'you' or no subject -> '{content}'"
  first_person_description: "First person: frontmatter description contains 'I', should use no subject -> '{content}'"
  inflated_title_body: "Inflated title: body line {line} contains '{title}', use concrete occupation (engineer/analyst/reviewer), not abstract honorifics"
  inflated_title_description: "Inflated title: frontmatter description contains '{title}', use concrete occupation"
  fabricated_years_body: "Fabricated experience: body line {line} contains '{years}', LLMs do not have 'years of experience', use domain/methodology descriptions instead"
  fabricated_years_description: "Fabricated experience: frontmatter description contains '{years}', LLMs do not have 'years of experience'"
  deprecated_tool: "Tool name migration: found '{old}', should use '{new}' instead"
  workflow_step_count: "Step '{step}' has {actual} checklist items, expected {expected}"
  workflow_missing_dimension: "Node '{step}' missing required dimension: {dimension}"
  workflow_critical_missing_dimension: "Critical node '{step}' missing dimension: {dimension}"
  workflow_not_found: "Workflow section not found"
  rules_block_not_found: "Rules block not found (heading should contain 'Rules' or '规则')"
  rules_no_entries: "No rule entries found in rules section (bullet list)"
  rule_no_rfc2119: "Rule {index} does not use RFC 2119 keywords: '{content}'"
  reference_missing: "Referenced reference file does not exist: {path}"
  script_missing: "Referenced script file does not exist: {path}"
  asset_missing: "Referenced asset file does not exist: {path}"
  design_guide_missing: "Referenced design guide file does not exist: {path}"
  template_missing: "Referenced template file does not exist: {path}"
  file_dependency_missing: "File dependency decision missing: no file dependency decision instruction found in workflow (add 'file dependency decision' or reference design-rationale.md §9)"
  tool_binding_missing: "Tool binding missing: the following actions lack tool bindings (format [ToolName] operation -> output), while other actions in the same SKILL are bound:\n{lines}"
  output_spec_missing: "Review/test SKILL missing {label}: no patterns matching {patterns} found"
  ur_skill_leak: "UR-SKILL file reference leak: generated SKILL references '{path}', violating the self-contained rule (MUST NOT reference UR-SKILL internal files)"
  unresolved_placeholder: "Unresolved placeholder: found {count} occurrences of '{label}'"
  capability_workflow_confusion: "Capability-workflow confusion: '{term}' appears in the {section} area; capability matrix and workflow must be strictly separated"
  capability_workflow_confused_terms: "Capability-workflow confusion: {count} forbidden terms found in {section}: {terms}"
  tool_reference_table_missing: "Tool reference table missing: workflow uses tool bindings but no tool reference table found (should contain 'Tool Reference' or similar identifier)"
  semantic_alignment_weak: "Weak semantic alignment: {matched}/{total} capability domain terms absent in workflow actions ({unmatched}). Consider strengthening semantic consistency"
  validation_failed: "Validation failed: found {count} issue(s)"
  validation_passed: "Validation passed"
  skill_file_not_found: "Error: SKILL.md not found at {path}"
  summary_items:
    - "frontmatter fields complete"
    - "body {body_lines}/{max_lines} lines"
    - "no placeholder residues"
    - "risk boundaries complete"
    - "professional boundaries complete"
    - "workflow checklist counts correct"
    - "all referenced files exist"
    - "tool binding check passed"
    - "output spec check passed"
  summary_line: "  - {item}"
